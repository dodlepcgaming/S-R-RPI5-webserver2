<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container { position: relative; width: 1280px; height: 720px; background: #000; margin: 0 auto; }
        iframe { width: 100%; height: 100%; border: none; }
        #data-box { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.6); color: #00ff00; 
            padding: 15px; font-family: 'Courier New', monospace;
            pointer-events: none;
            border-left: 3px solid #00ff00;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://192.168.50.6:8889/mystream"></iframe>

        <div id="data-box">
            STATUS: <span id="status" style="color:white">CONNECTING...</span><br>
            DISTANCE: <span id="val">--</span>
        </div>
    </div>

<script>
    let ws;
    // This object tracks the state of your arrow keys
    const inputState = { MovementK: '0' };

    function connect() {
        ws = new WebSocket("ws://192.168.50.6:8001");

        ws.onopen = () => {
            console.log("SUCCESS: Connected to Pi 5!");
            document.getElementById('status').innerText = "LIVE";
            document.getElementById('status').style.color = "#00ff00";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            document.getElementById('val').innerText = data.sensor;
            let distInt = parseInt(data.sensor);
            document.getElementById('val').style.color = (distInt < 100) ? "red" : "#00ff00";
        };

        ws.onclose = () => {
            console.log("WARNING: Disconnected from Pi. Retrying...");
            document.getElementById('status').innerText = "DISCONNECTED";
            document.getElementById('status').style.color = "red";
            setTimeout(connect, 2000);
        };
    }

    // Keyboard Input Logic
    window.addEventListener("keydown", (e) => {
        let command = '0';
        if (e.key === "ArrowUp")    command = '5';
        if (e.key === "ArrowDown")  command = '6';
        if (e.key === "ArrowLeft")  command = '7';
        if (e.key === "ArrowRight") command = '8';
        if (e.key === "w")    command = '1';
        if (e.key === "a")  command = '2';
        if (e.key === "s")  command = '3';
        if (e.key === "d") command = '4';

        if (command !== '0' && ws && ws.readyState === WebSocket.OPEN) {
            console.log("Sending Command:", command); // THIS SHOULD SHOW IN CONSOLE
            ws.send(JSON.stringify({ "command": command }));
        }
    });

    window.addEventListener("keyup", (e) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            console.log("Stopping Motors (Key Up)");
            ws.send(JSON.stringify({ "command": '0' }));
        }
    });

    connect(); 
</script>
<script src="UserInputs.js"></script>
</body>
</html>
