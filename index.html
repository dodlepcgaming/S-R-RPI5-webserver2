<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container { position: relative; width: 1280px; height: 720px; background: #000; margin: 0 auto; }
        iframe { width: 100%; height: 100%; border: none; }
        #data-box { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.6); color: #00ff00; 
            padding: 15px; font-family: 'Courier New', monospace;
            pointer-events: none;
            border-left: 3px solid #00ff00;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://192.168.50.6:8889/mystream"></iframe>

        <div id="data-box">
            STATUS: <span id="status" style="color:white">CONNECTING...</span><br>
            DISTANCE: <span id="val">--</span>
        </div>
    </div>

<script>
    function connect() {
        const ws = new WebSocket("ws://192.168.50.6:8001");

        ws.onopen = () => {
            document.getElementById('status').innerText = "LIVE";
            document.getElementById('status').style.color = "#00ff00";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            document.getElementById('val').innerText = data.sensor;
            
            // Visual alert if too close
            let distInt = parseInt(data.sensor);
            document.getElementById('val').style.color = (distInt < 100) ? "red" : "#00ff00";
        };

        ws.onclose = () => {
            document.getElementById('status').innerText = "DISCONNECTED";
            document.getElementById('status').style.color = "red";
            document.getElementById('val').innerText = "--";
            // Try to reconnect every 2 seconds
            setTimeout(connect, 2000);
        };
    }

    connect(); // Start connection
</script>
</body>
</html>
