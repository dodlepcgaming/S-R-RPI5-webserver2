<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container { position: relative; width: 1280px; height: 720px; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        #data-box { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0, 0, 0, 0.6); color: #00ff00; 
            padding: 15px; font-family: 'Courier New', monospace;
            pointer-events: none; /* Allows clicking through to video controls */
            border-left: 3px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- MediaMTX WebRTC Stream -->
        <iframe src="http://<PI_IP>:8889/cam"></iframe>

        <!-- Sensor Overlay -->
        <div id="data-box">
            STATUS: <span style="color:white">LIVE</span><br>
            DATA: <span id="val">--</span>
        </div>
    </div>

<script>
    const ws = new WebSocket("ws://<PI_IP>:8000/ws");
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        document.getElementById('val').innerText = data.sensor;
    };
    ws.onclose = () => { document.getElementById('val').innerText = "DISCONNECTED"; };
</script>
</html>
